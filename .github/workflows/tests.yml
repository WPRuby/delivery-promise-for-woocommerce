name: Tests

on:
  push:
  pull_request:

env:
  WPRUBY_DP_TESTING: '1'
  WP_TESTS_DIR: /tmp/wordpress-tests-lib
  WP_CORE_DIR: /tmp/wordpress
  WP_TESTS_WC_PLUGIN: /tmp/wordpress/wp-content/plugins/woocommerce/woocommerce.php

jobs:
  unit:
    name: Unit tests (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['7.4', '8.1', '8.2']

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run unit tests
        run: composer test:unit

      - name: Run PHP lint
        if: matrix.php == '8.2'
        run: composer lint

  integration:
    name: Integration tests (PHP 8.2)
    runs-on: ubuntu-latest
    needs: unit

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: wordpress_test
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --host=127.0.0.1 --user=root --password=root"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none
          tools: composer:v2
          extensions: mysqli, zip

      - name: Install system test tools
        run: sudo apt-get update && sudo apt-get install -y subversion unzip

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Install WordPress test suite
        run: bash bin/install-wp-tests.sh wordpress_test root root 127.0.0.1 latest true

      - name: Install WooCommerce
        run: |
          mkdir -p /tmp/wordpress/wp-content/plugins
          curl -fsSL https://downloads.wordpress.org/plugin/woocommerce.latest-stable.zip -o /tmp/woocommerce.zip
          unzip -q /tmp/woocommerce.zip -d /tmp/wordpress/wp-content/plugins

      - name: Run integration tests
        run: WPRUBY_DP_LOAD_WP_TESTS=1 composer test:integration
